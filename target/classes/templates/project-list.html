<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Project List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">🎓 Campus Innovation Portal</a>
    <div>
        <a th:href="@{/projects/submit}" class="btn btn-success btn-sm me-2">Submit Project</a>
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a th:href="@{/auth/logout}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">All Projects</h2>
    <div class="row">
        <div class="col-md-6 mb-4" th:each="project : ${projects}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${project.title}"></h5>
                    <p class="card-text" th:text="${project.description}"></p>
                    <span class="badge bg-primary me-1" th:text="${project.domain}"></span>
                    <span class="badge bg-warning text-dark me-1" th:text="${project.status}"></span>
                    <span class="badge bg-success">👍 <span th:text="${project.voteCount}"></span> Votes</span>
                </div>
                <div class="card-footer d-flex gap-2">
                    <form th:action="@{/vote/{id}(id=${project.id})}" method="post">
                        <button type="submit" class="btn btn-outline-primary btn-sm">👍 Vote</button>
                    </form>
                    <form th:action="@{/team/join/{id}(id=${project.id})}" method="post">
                        <button type="submit" class="btn btn-outline-success btn-sm">🤝 Join Team</button>
                    </form>
                    <form th:action="@{/milestone/{id}(id=${project.id})}" method="get">
                        <button type="submit" class="btn btn-outline-info btn-sm">📋 Milestones</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
