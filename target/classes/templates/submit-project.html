<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Submit Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">🎓 Campus Innovation Portal</a>
    <div>
        <a th:href="@{/projects/list}" class="btn btn-outline-light btn-sm me-2">Projects</a>
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a th:href="@{/auth/logout}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="mb-4">💡 Submit Your Project Idea</h3>
                    <form th:action="@{/projects/create}" th:object="${project}" method="post">
                        <div class="mb-3">
                            <input type="text" th:field="*{title}" class="form-control" placeholder="Project Title" required/>
                        </div>
                        <div class="mb-3">
                            <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Project Description" required></textarea>
                        </div>
                        <div class="mb-3">
                            <input type="text" th:field="*{domain}" class="form-control" placeholder="Domain (e.g. AI, Web, IoT)" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Submit Project</button>
                    </form>
                    <a th:href="@{/projects/list}" class="btn btn-link mt-2">View All Projects</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
