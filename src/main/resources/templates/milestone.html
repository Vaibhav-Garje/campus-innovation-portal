<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Project Milestones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">🎓 Campus Innovation Portal</a>
    <div>
        <a th:href="@{/projects/list}" class="btn btn-outline-light btn-sm me-2">Projects</a>
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a th:href="@{/auth/logout}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Project Info -->
    <div class="card shadow mb-4" data-aos="fade-down">
        <div class="card-body">
            <h3 th:text="${project.title}"></h3>
            <p th:text="${project.description}"></p>
            <span class="badge bg-primary me-1" th:text="${project.domain}"></span>
            <span class="badge bg-warning text-dark" th:text="${project.status}"></span>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="card shadow mb-4" data-aos="fade-up">
        <div class="card-body">
            <h5>📈 Project Progress</h5>
            <div class="progress mb-3" style="height: 25px;">
                <div class="progress-bar bg-success"
                     th:style="'width:' + ${project.progress} + '%'"
                     th:text="${project.progress} + '%'">
                </div>
            </div>
            <form th:action="@{/milestone/progress/{id}(id=${project.id})}" method="post">
                <div class="d-flex gap-2">
                    <input type="number" name="progress" class="form-control"
                           min="0" max="100" th:value="${project.progress}"
                           placeholder="Enter progress %"/>
                    <button type="submit" class="btn btn-primary">Update</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Milestone -->
    <div class="card shadow mb-4" data-aos="fade-up">
        <div class="card-body">
            <h5>➕ Add Milestone</h5>
            <form th:action="@{/milestone/add/{id}(id=${project.id})}"
                  th:object="${newMilestone}" method="post">
                <div class="mb-3">
                    <input type="text" th:field="*{description}"
                           class="form-control" placeholder="Milestone description" required/>
                </div>
                <div class="mb-3">
                    <input type="date" th:field="*{date}" class="form-control" required/>
                </div>
                <button type="submit" class="btn btn-success">Add Milestone</button>
            </form>
        </div>
    </div>

    <!-- Milestones List -->
    <div class="card shadow" data-aos="fade-up">
        <div class="card-body">
            <h5>📋 Milestones</h5>
            <ul class="list-group mt-3">
                <li class="list-group-item d-flex justify-content-between"
                    th:each="m : ${milestones}">
                    <span th:text="${m.description}"></span>
                    <span class="badge bg-secondary" th:text="${m.date}"></span>
                </li>
            </ul>
            <p class="text-muted mt-2" th:if="${#lists.isEmpty(milestones)}">
                No milestones added yet.
            </p>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init();</script>
</body>
</html>
